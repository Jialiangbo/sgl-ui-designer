<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGL UI Designer - 设置</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">

    <nav class="nav-tabs">
      <button class="nav-tab" data-nav="index">首页</button>
      <button class="nav-tab" data-nav="editor">编辑器</button>
      <button class="nav-tab" data-nav="preview">预览</button>
      <button class="nav-tab" data-nav="components">代码</button>
      <button class="nav-tab active" data-nav="settings">设置</button>
    </nav>
    <div class="header-actions"></div>
  </header>

  <div class="app-main" style="background:#0f0f1a;">
    <div class="settings-container">
      <div class="settings-panel">
        <div class="panel-title" style="font-size:14px;font-weight:700;margin-bottom:16px;">项目信息</div>
        <div class="form-group">
          <label class="form-label">项目名称</label>
          <input type="text" class="form-input" id="s-project-name" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">屏幕宽度 (px)</label>
            <input type="number" class="form-input" id="s-screen-w" min="100" max="4096" />
          </div>
          <div class="form-group">
            <label class="form-label">屏幕高度 (px)</label>
            <input type="number" class="form-input" id="s-screen-h" min="100" max="4096" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">颜色深度</label>
          <select class="form-select" id="s-color-depth">
            <option value="8bit">8 bit (256 色)</option>
            <option value="16bit">16 bit (65536 色)</option>
            <option value="24bit">24 bit (RGB)</option>
            <option value="32bit">32 bit (RGBA)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">版本号</label>
          <input type="text" class="form-input" id="s-version" />
        </div>
      </div>

      <div class="settings-panel" style="margin-top:16px;">
        <div class="panel-title" style="font-size:14px;font-weight:700;margin-bottom:16px;">预设屏幕尺寸</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
          <button class="btn btn-sm" data-preset="320x240">320 × 240</button>
          <button class="btn btn-sm" data-preset="480x320">480 × 320</button>
          <button class="btn btn-sm" data-preset="800x480">800 × 480</button>
          <button class="btn btn-sm" data-preset="320x480">320 × 480</button>
          <button class="btn btn-sm" data-preset="240x240">240 × 240</button>
          <button class="btn btn-sm" data-preset="1280x720">1280 × 720</button>
        </div>
      </div>

      <div class="settings-panel" style="margin-top:16px;">
        <div class="panel-title" style="font-size:14px;font-weight:700;margin-bottom:16px;">项目管理</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-sm" id="btn-import">导入项目 JSON</button>
          <button class="btn btn-sm" id="btn-export">导出项目 JSON</button>
          <button class="btn btn-sm" style="border-color:var(--error);color:var(--error);" id="btn-reset">重置全部</button>
        </div>
        <input type="file" id="file-import" style="display:none;" accept=".json" />
      </div>

      <div class="settings-panel" style="margin-top:16px;">
        <div class="panel-title" style="font-size:14px;font-weight:700;margin-bottom:16px;">关于</div>
        <p style="color:var(--text-secondary);line-height:1.8;font-size:13px;">
          <strong>SGL UI Designer</strong> 是一个基于 <a href="https://github.com/sgl-org/sgl" target="_blank" style="color:var(--accent);">SGL 图形库</a> 的跨平台可视化界面设计工具，使用 Tauri 2.0 构建。
        </p>
        <p style="color:var(--text-muted);line-height:1.8;font-size:12px;margin-top:8px;">
          版本: 0.1.0 | 支持: 拖放组件 / 多页面 / C 代码生成
        </p>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span id="status-project">项目: -</span>
    <span id="status-screen">屏幕: -</span>
  </div>

  <script type="module" src="settings.js"></script>
</body>
</html>
